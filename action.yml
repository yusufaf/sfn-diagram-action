name: 'Step Functions Diagram Preview'
description: 'Preview and diff AWS Step Functions ASL diagrams on pull requests'
author: 'sfn-diagram'

inputs:
  github-token:
    description: 'GitHub token for posting PR comments'
    required: false
    default: ${{ github.token }}
  asl-glob:
    description: 'Comma-separated glob patterns to match ASL definition files'
    required: false
    default: '**/*.asl.json,**/*.asl'
  comment-tag:
    description: 'Unique tag used to find and update an existing PR comment'
    required: false
    default: 'sfn-diagram-preview'

runs:
  using: 'node24'
  main: 'dist/index.js'

branding:
  icon: 'git-merge'
  color: 'orange'
